{% extends 'base.html' %} {% block content %}
<article>
  <h1>Create your destination</h1>
  <form
    mix-post="/api-create-post"
    enctype="multipart/form-data"
    id="create_post"
  >
    <div class="post-title">
      <label for="post_title">Title</label>
      <input name="post_title" id="title_destination" type="text" />
    </div>

    <div class="field">
      <label for="post_description">Description</label>
      <textarea name="post_description" id="post_description" rows="10"></textarea>
    </div>
    <div class="field">
      <label for="post_img">Description</label>
      <input name="file" type="file" accept="image/png, image/jpeg"/>
    </div>

    <button type="submit">Share</button>
  </form>
</article>
{% endblock content %}
