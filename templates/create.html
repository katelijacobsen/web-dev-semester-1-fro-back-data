{% extends 'base.html' %} {% block content %}
<article>
  <h1 id="tip" class="tip">{{ tip }}</h1>
  <form
    mix-post="/api-create-recipe"
    enctype="multipart/form-data"
    id="create_post"
  >
    <div class="field-group">
      <!-- Main info -->
      <div>
        <label for="recipe_title">Title</label>
        <input name="recipe_title" id="recipe_title" type="text" />
      </div>
      <div>
        <label for="recipe_prep_time">Prep Time</label>
        <input name="recipe_prep_time" id="recipe_prep_time" type="text" />
      </div>
      <div>
        <label for="recipe_cook_time">Cook Time</label>
        <input name="recipe_cook_time" id="recipe_cook_time" type="text" />
      </div>
      <div>
        <label for="recipe_servings">Servings</label>
        <input name="recipe_servings" id="recipe_servings" type="text" />
      </div>
    </div>

    <!-- Upload Image -->
    <div class="field">
      <label for="recipe_img">Photo</label>
      <input name="recipe_file" type="file" accept="image/png, image/jpeg" />
    </div>

    <!-- Description -->
    <div class="field-group">
      <label for="recipe_description">Description</label>
      <textarea
        name="recipe_description"
        id="recipe_description"
        rows="4"
      ></textarea>
    </div>

    <!-- Ingredients -->
    <div class="field-group">
      <h2>Ingredients</h2>
      <ul id="ingredients-container">
      </ul>
      <button type="button" onclick="addIngredient()">Add</button>
    </div>

    <!-- Instructions -->
    <div class="field-group">
      <h2>Instructions</h2>
      <ol id="instructions-container"></ol>
      <button type="button" class="btn-add" onclick="addStep()">Add</button>
    </div>

    <button>Share Recipe</button>
  </form>
</article>
{% endblock content %}
