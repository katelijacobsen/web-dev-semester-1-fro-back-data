{% extends 'base.html' %}
{% block header %} <h1>{% block title%} Log in {% endblock title %}</h1> {% endblock header %}

{% block content %}
<form action="/api-login" method="post" id="signup">
  {% if error %}
  <span>{{error}}</span>
  {% endif %}
  <label for="email">
    Email
    <input type="email" name="user_email" id="user_email" required />
  </label>
  <label for="password">
    Password
    <input type="password" name="user_password" id="user_password" required />
  </label>
  <span id="tip" class="error-msg" aria-live="polite">{{ msg }}</span>
  <button type="submit">Login</button>
</form>
{% endblock content %}
